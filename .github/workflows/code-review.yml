name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── 1. PR Quality Gates ───────────────────────────────────────────────────────
  pr-quality:
    name: PR Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            perf
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The PR title subject must start with an uppercase letter.
            Example: "feat: Add user authentication"

      - name: Check PR has description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            if (body.trim().length < 50) {
              core.setFailed(
                'PR description is too short. Please describe what this PR does and why.'
              );
            }

      - name: Check for large PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            if (total > 800) {
              core.warning(
                `This PR changes ${total} lines. Consider splitting it into smaller PRs for easier review.`
              );
            }

  # ── 2. Diff-based Static Analysis ────────────────────────────────────────────
  static-analysis:
    name: Static Analysis on Changed Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx

      - name: Lint changed files only
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          npx eslint ${{ steps.changed-files.outputs.all_changed_files }} --max-warnings=0

      - name: Typecheck
        run: pnpm run typecheck

  # ── 3. Test Coverage Delta ────────────────────────────────────────────────────
  coverage-check:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter @it-management/api run test:unit -- --run --coverage
        continue-on-error: true

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let coverageComment = '### Test Coverage\n\n';
            try {
              // Vitest outputs coverage to coverage/coverage-summary.json
              const summary = JSON.parse(
                fs.readFileSync('coverage/coverage-summary.json', 'utf8')
              );
              const total = summary.total;
              const lines = total.lines.pct;
              const branches = total.branches.pct;
              const functions = total.functions.pct;
              const statements = total.statements.pct;

              const badge = (pct) => pct >= 80 ? '🟢' : pct >= 60 ? '🟡' : '🔴';

              coverageComment += `| Metric | Coverage |\n|--------|----------|\n`;
              coverageComment += `| Lines | ${badge(lines)} ${lines}% |\n`;
              coverageComment += `| Branches | ${badge(branches)} ${branches}% |\n`;
              coverageComment += `| Functions | ${badge(functions)} ${functions}% |\n`;
              coverageComment += `| Statements | ${badge(statements)} ${statements}% |\n`;

              if (lines < 60) {
                coverageComment += '\n> Warning: Coverage below 60% -- consider adding tests for new code.\n';
              }
            } catch (e) {
              coverageComment += '_Coverage report not available (no tests ran or coverage not configured)._\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('### Test Coverage')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: coverageComment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageComment,
              });
            }

  # ── 4. Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
        continue-on-error: true
