name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: node scripts/migrate.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-web:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    outputs:
      vercel_url: ${{ steps.deploy.outputs.vercel_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel CLI (generates .vercel/output)
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy pre-built output to Vercel (production)
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prod --prebuilt --token ${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$DEPLOY_OUTPUT"
          # Capture the unique deployment URL (Production: line) — this URL always has
          # the current deployment's routes. The alias URL may point to a different project.
          VERCEL_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-z0-9-]+-[a-z0-9]+-rinehardramos-projects\.vercel\.app' | head -1)
          echo "vercel_url=$VERCEL_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

  smoke-test:
    name: Smoke test deployed services
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    steps:
      - name: Wait for propagation
        run: sleep 15

      - name: Healthcheck — Vercel
        run: |
          curl --fail --max-time 10 --retry 3 --retry-delay 5 \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "${{ needs.deploy-web.outputs.vercel_url }}/api/healthz"

      - name: Healthcheck — Railway
        run: curl --fail --max-time 10 --retry 3 --retry-delay 5 "${{ secrets.RAILWAY_API_URL }}/api/healthz"

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Supabase migrations applied" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: ${{ needs.deploy-web.outputs.vercel_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Railway: ${{ secrets.RAILWAY_API_URL }}" >> $GITHUB_STEP_SUMMARY
