name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  migrate:
    name: Run Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_API_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-web:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm ci

      - name: Build with Vercel CLI (generates .vercel/output)
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy pre-built output to Vercel (production)
        run: vercel deploy --prod --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

  smoke-test:
    name: Smoke test deployed services
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    steps:
      - name: Wait for propagation
        run: sleep 15

      - name: Healthcheck — Vercel
        run: curl --fail --max-time 10 --retry 3 --retry-delay 5 "${{ secrets.VERCEL_APP_URL }}/api/healthz"

      - name: Healthcheck — Railway
        run: curl --fail --max-time 10 --retry 3 --retry-delay 5 "${{ secrets.RAILWAY_API_URL }}/api/healthz"

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Supabase migrations applied" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: ${{ secrets.VERCEL_APP_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- Railway: ${{ secrets.RAILWAY_API_URL }}" >> $GITHUB_STEP_SUMMARY
